<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>寶可夢卡牌對戰</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#07091a;--surface:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.10);--text:#e8eaf6;--muted:#7986cb;
      --font-display:'ZCOOL KuaiLe','Segoe UI',sans-serif;--radius-card:22px;
      --shadow-card:0 2px 0 rgba(0,0,0,0.35),0 10px 24px rgba(0,0,0,0.35);
      --shadow-card-hover:0 4px 0 rgba(0,0,0,0.35),0 14px 30px rgba(0,0,0,0.42)}
    body{font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;gap:2.5rem;text-align:center;overflow:hidden}
    #stars{position:fixed;inset:0;z-index:0;pointer-events:none}
    .content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:2.5rem;width:100%;max-width:440px}
    .hero-wrap{position:relative;display:flex;align-items:center;justify-content:center}
    .hero-glow{position:absolute;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(240,80,48,0.35),rgba(240,80,48,0) 70%);filter:blur(6px);animation:heroPulse 3.5s ease-in-out infinite;z-index:0}
    @keyframes heroPulse{0%,100%{transform:scale(1);opacity:0.65}50%{transform:scale(1.18);opacity:1}}
    .pokeball{width:90px;height:90px;border-radius:50%;background:linear-gradient(180deg,#e63946 50%,#f1f1f1 50%);border:5px solid #111;position:relative;z-index:1;animation:spin 5s linear infinite;flex-shrink:0}
    .pokeball::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:24px;height:24px;border-radius:50%;background:#f1f1f1;border:5px solid #111;z-index:2}
    .pokeball::after{content:'';position:absolute;top:calc(50% - 2.5px);left:0;right:0;height:5px;background:#111}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    h1{font-family:var(--font-display);font-weight:400;font-size:clamp(2rem,7vw,3.2rem);background:linear-gradient(135deg,#f8d030 0%,#f05030 50%,#6890f0 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:0.04em}
    p{color:var(--muted);font-size:0.95rem}
    .modes{display:flex;flex-direction:column;gap:1rem;width:100%}
    .mode-card{position:relative;overflow:hidden;display:flex;align-items:center;gap:1.2rem;padding:1.4rem 1.6rem;border-radius:var(--radius-card);border:2px solid var(--border);background:var(--surface);text-decoration:none;color:var(--text);transition:transform 0.2s,box-shadow 0.2s,border-color 0.2s,background 0.2s;text-align:left;box-shadow:var(--shadow-card)}
    .mode-card::before{content:'';position:absolute;inset:0 0 auto 0;height:45%;background:linear-gradient(180deg,rgba(255,255,255,0.10),rgba(255,255,255,0));pointer-events:none}
    .mode-card::after{content:'';position:absolute;top:0;left:-60%;width:40%;height:100%;background:linear-gradient(115deg,transparent,rgba(255,255,255,0.16),transparent);transform:skewX(-20deg);transition:left 0.6s ease;pointer-events:none}
    .mode-card:hover::after{left:130%}
    .mode-card:hover{transform:translateY(-3px);background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.22);box-shadow:var(--shadow-card-hover)}
    .mode-card.single{border-color:rgba(104,144,240,0.3)}
    .mode-card.single:hover{border-color:rgba(104,144,240,0.65);box-shadow:var(--shadow-card-hover),0 0 28px rgba(104,144,240,0.18)}
    .mode-card.pvp{border-color:rgba(248,208,48,0.35)}
    .mode-card.pvp:hover{border-color:rgba(248,208,48,0.7);box-shadow:var(--shadow-card-hover),0 0 28px rgba(248,208,48,0.18)}
    .mode-card.pet{border-color:rgba(240,128,176,0.3)}
    .mode-card.pet:hover{border-color:rgba(240,128,176,0.65);box-shadow:var(--shadow-card-hover),0 0 28px rgba(240,128,176,0.18)}
    .mode-icon-badge{position:relative;flex-shrink:0;width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 35% 30%,rgba(255,255,255,0.18),rgba(255,255,255,0.04));box-shadow:0 3px 8px rgba(0,0,0,0.35),inset 0 1px 2px rgba(255,255,255,0.15)}
    .mode-card.single .mode-icon-badge{box-shadow:0 3px 8px rgba(0,0,0,0.35),inset 0 1px 2px rgba(255,255,255,0.15),0 0 16px rgba(104,144,240,0.45)}
    .mode-card.pvp .mode-icon-badge{box-shadow:0 3px 8px rgba(0,0,0,0.35),inset 0 1px 2px rgba(255,255,255,0.15),0 0 16px rgba(248,208,48,0.5)}
    .mode-card.pet .mode-icon-badge{box-shadow:0 3px 8px rgba(0,0,0,0.35),inset 0 1px 2px rgba(255,255,255,0.15),0 0 16px rgba(240,128,176,0.45)}
    .mode-icon-badge svg{width:30px;height:30px}
    .mode-title{font-family:var(--font-display);font-weight:400;font-size:1.2rem;margin-bottom:0.22rem}
    .mode-desc{font-size:0.8rem;color:var(--muted);line-height:1.4}
    .btn{padding:0.6rem 1.4rem;border:none;border-radius:999px;font-size:0.9rem;font-weight:700;cursor:pointer;transition:all 0.2s;letter-spacing:0.02em}
    .btn-primary{background:linear-gradient(135deg,#f8d030,#f05030);color:#fff;box-shadow:0 4px 20px rgba(248,208,48,0.3)}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(248,208,48,0.5)}
    .btn-secondary{background:rgba(255,255,255,0.07);color:var(--text);border:1px solid var(--border)}
    .btn-secondary:hover{background:rgba(255,255,255,0.13);transform:translateY(-2px)}
    #auth-bar{display:flex;gap:0.6rem;align-items:center;font-size:0.85rem;color:var(--muted);flex-wrap:wrap;justify-content:center}
    #auth-status-anon, #auth-status-loggedin{display:flex;gap:0.5rem;align-items:center}
    #auth-status-loggedin{display:none}
    #auth-panel{display:none;flex-direction:column;gap:0.6rem;width:100%;max-width:280px;align-items:center}
    #auth-panel input{padding:0.6rem 1rem;border-radius:999px;border:2px solid var(--border);background:var(--surface);color:var(--text);font-size:1rem;width:100%;box-sizing:border-box;text-align:center;outline:none;transition:border-color 0.2s,box-shadow 0.2s}
    #auth-panel input:focus{border-color:rgba(248,208,48,0.55);box-shadow:0 0 0 3px rgba(248,208,48,0.22)}
    #auth-panel .btn{width:100%}
    #auth-err{color:#ef5350;font-size:0.82rem;min-height:1.1em}
  </style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="content">
  <div class="hero-wrap"><div class="hero-glow"></div><div class="pokeball"></div></div>
  <div>
    <h1>寶可夢卡牌對戰</h1>
    <p>選擇遊戲模式</p>
  </div>

  <div id="auth-bar">
    <span id="auth-status-anon">
      <button class="btn btn-secondary" onclick="toggleAuthPanel()">登入 / 註冊</button>
    </span>
    <span id="auth-status-loggedin">
      已登入：<b id="auth-username-label"></b>
      <button class="btn btn-secondary" onclick="logout()">登出</button>
    </span>
  </div>

  <div id="auth-panel">
    <p id="auth-mode-label" style="font-weight:700">登入</p>
    <input id="auth-username-input" placeholder="帳號（3-20碼英數/底線）">
    <input id="auth-password-input" type="password" placeholder="密碼（至少8碼）" onkeydown="if(event.key==='Enter')submitAuth()">
    <button class="btn btn-primary" id="auth-submit-btn" onclick="submitAuth()">登入</button>
    <button class="btn btn-secondary" onclick="toggleAuthMode()" id="auth-toggle-btn">還沒有帳號？註冊一個</button>
    <div id="auth-err"></div>
  </div>

  <div class="modes">
    <a class="mode-card single" href="/single.html">
      <div class="mode-icon-badge">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="2.5" width="2" height="4" rx="1" fill="#6890f0"/>
          <circle cx="4" cy="2.5" r="1.6" fill="#6890f0"/>
          <rect x="2" y="6.5" width="20" height="14" rx="5" fill="#6890f0"/>
          <circle cx="8.5" cy="13.5" r="2.1" fill="#0b0d1f"/>
          <circle cx="15.5" cy="13.5" r="2.1" fill="#0b0d1f"/>
          <rect x="7" y="18" width="10" height="1.8" rx="0.9" fill="#0b0d1f" opacity="0.55"/>
        </svg>
      </div>
      <div>
        <div class="mode-title">單人模式</div>
        <div class="mode-desc">挑戰三個關卡的電腦 AI，收集寶可夢組建最強隊伍</div>
      </div>
    </a>
    <a class="mode-card pvp" href="/pvp.html">
      <div class="mode-icon-badge">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <g stroke="#f8d030" stroke-width="2.4" stroke-linecap="round">
            <line x1="4" y1="4" x2="18" y2="18"/>
            <line x1="20" y1="4" x2="6" y2="18"/>
          </g>
          <circle cx="4" cy="4" r="2.2" fill="#f8d030"/>
          <circle cx="20" cy="4" r="2.2" fill="#f8d030"/>
          <circle cx="18" cy="18" r="1.6" fill="#f05030"/>
          <circle cx="6" cy="18" r="1.6" fill="#f05030"/>
        </svg>
      </div>
      <div>
        <div class="mode-title">雙人對戰</div>
        <div class="mode-desc">建立房間或輸入代碼，與朋友即時連線對戰</div>
      </div>
    </a>
    <a class="mode-card pet" href="/tamagotchi.html">
      <div class="mode-icon-badge">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 13a8 8 0 0 1 16 0" fill="#e63946"/>
          <path d="M4 13a8 8 0 0 0 16 0" fill="#f1f1f1"/>
          <rect x="4" y="12.3" width="16" height="1.4" fill="#111"/>
          <circle cx="12" cy="13" r="2.6" fill="#f1f1f1" stroke="#111" stroke-width="1.3"/>
          <path d="M9.2 5.4c.9-1.6 3.4-1.7 4.1.2.7-1.9 3.2-1.8 4.1-.2 1 1.8-1 4-4.1 6-3.1-2-5.1-4.2-4.1-6z" fill="#f06292"/>
        </svg>
      </div>
      <div>
        <div class="mode-title">我的寶可夢</div>
        <div class="mode-desc">登入後養一隻寶可夢，看牠在畫面上閒晃、跟牠互動（需登入）</div>
      </div>
    </a>
  </div>
</div>
<script>
(function(){
  const cvs=document.getElementById('stars'),ctx=cvs.getContext('2d');let stars=[];
  function resize(){cvs.width=innerWidth;cvs.height=innerHeight;stars=Array.from({length:120},()=>({x:Math.random()*cvs.width,y:Math.random()*cvs.height,r:Math.random()*1.3+0.2,a:Math.random(),da:(Math.random()-0.5)*0.007}));}
  function draw(){ctx.clearRect(0,0,cvs.width,cvs.height);for(const s of stars){s.a+=s.da;if(s.a<=0.05||s.a>=1)s.da=-s.da;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${s.a.toFixed(2)})`;ctx.fill();}requestAnimationFrame(draw);}
  resize();draw();addEventListener('resize',resize);
})();

/* ─────────────────────────────────────────
   ACCOUNTS —— 登入介面統一放在首頁，pvp.html/tamagotchi.html
   都只讀同一把 localStorage['pvpToken']，不需要各自帶一份表單。
───────────────────────────────────────── */
let myToken    = localStorage.getItem('pvpToken') || null;
let myUsername = localStorage.getItem('pvpUsername') || null;
let authMode    = 'login'; // or 'register'

function updateAuthUI() {
  const anon = document.getElementById('auth-status-anon');
  const li   = document.getElementById('auth-status-loggedin');
  if (myToken) {
    anon.style.display = 'none';
    li.style.display = 'flex';
    document.getElementById('auth-username-label').textContent = myUsername || '';
    document.getElementById('auth-panel').style.display = 'none';
  } else {
    anon.style.display = 'flex';
    li.style.display = 'none';
  }
}

async function refreshAuthFromServer() {
  if (!myToken) { updateAuthUI(); return; }
  try {
    const res = await fetch('/api/me', { headers: { Authorization: `Bearer ${myToken}` } });
    if (!res.ok) {
      myToken = null; myUsername = null;
      localStorage.removeItem('pvpToken'); localStorage.removeItem('pvpUsername');
    } else {
      const data = await res.json();
      myUsername = data.username;
      localStorage.setItem('pvpUsername', myUsername);
    }
  } catch (e) { /* 網路暫時失敗就先維持本機狀態，不因為這樣把人登出 */ }
  updateAuthUI();
}

function toggleAuthPanel() {
  const panel = document.getElementById('auth-panel');
  panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
}

function toggleAuthMode() {
  authMode = authMode === 'login' ? 'register' : 'login';
  document.getElementById('auth-mode-label').textContent  = authMode === 'login' ? '登入' : '註冊';
  document.getElementById('auth-submit-btn').textContent  = authMode === 'login' ? '登入' : '註冊';
  document.getElementById('auth-toggle-btn').textContent  = authMode === 'login' ? '還沒有帳號？註冊一個' : '已經有帳號？登入';
  document.getElementById('auth-err').textContent = '';
}

function authErrMessage(code) {
  switch (code) {
    case 'invalid_username':   return '帳號格式錯誤（3-20碼英數或底線）';
    case 'invalid_password':   return '密碼至少需要8碼';
    case 'username_taken':     return '這個帳號已經有人使用了';
    case 'invalid_credentials':return '帳號或密碼錯誤';
    case 'no_db':              return '帳號功能目前無法使用';
    default:                   return '發生錯誤，請稍後再試';
  }
}

async function submitAuth() {
  const username = document.getElementById('auth-username-input').value.trim();
  const password = document.getElementById('auth-password-input').value;
  const errEl = document.getElementById('auth-err');
  errEl.textContent = '';
  const endpoint = authMode === 'login' ? '/api/login' : '/api/register';
  try {
    const res  = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = authErrMessage(data.error); return; }
    myToken = data.token; myUsername = data.username;
    localStorage.setItem('pvpToken', myToken);
    localStorage.setItem('pvpUsername', myUsername);
    updateAuthUI();
  } catch (e) {
    errEl.textContent = '連線失敗，請稍後再試';
  }
}

async function logout() {
  if (myToken) {
    try { await fetch('/api/logout', { method: 'POST', headers: { Authorization: `Bearer ${myToken}` } }); } catch (e) {}
  }
  myToken = null; myUsername = null;
  localStorage.removeItem('pvpToken'); localStorage.removeItem('pvpUsername');
  updateAuthUI();
}

refreshAuthFromServer();
</script>
</body>
</html>
