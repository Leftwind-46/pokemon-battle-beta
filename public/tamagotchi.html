<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>我的寶可夢</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#07091a;--border:rgba(255,255,255,0.10);--text:#e8eaf6;--muted:#7986cb}
  body{font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
  #stars{position:fixed;inset:0;z-index:0;pointer-events:none}
  .wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem;gap:1.5rem}
  h1{font-size:clamp(1.6rem,5vw,2.2rem);font-weight:900;background:linear-gradient(135deg,#f8d030 0%,#f05030 50%,#6890f0 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .btn{display:inline-block;padding:0.7rem 1.6rem;border-radius:12px;border:2px solid var(--border);background:rgba(255,255,255,0.06);color:var(--text);font-weight:700;font-size:0.9rem;cursor:pointer;text-decoration:none;transition:all 0.15s}
  .btn:hover{background:rgba(255,255,255,0.12);transform:translateY(-2px)}
  .btn-primary{background:linear-gradient(135deg,#f8d030,#f05030);border-color:transparent;color:#1a1a2e}
  a.back{font-size:0.82rem;color:var(--muted);text-decoration:none}

  /* ── login gate ── */
  #gate-screen{display:none;flex-direction:column;align-items:center;gap:1rem;text-align:center;margin-top:3rem}

  /* ── species picker ── */
  #pick-screen{display:none;flex-direction:column;align-items:center;gap:1.2rem;width:100%;max-width:900px}
  .pick-grid{display:flex;flex-wrap:wrap;gap:1rem;justify-content:center;width:100%}
  .species-card{width:130px;padding:1rem 0.8rem;border-radius:16px;border:2px solid var(--border);background:rgba(255,255,255,0.04);cursor:pointer;text-align:center;transition:all 0.15s}
  .species-card:hover{transform:translateY(-4px);background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.3)}
  .species-card img{width:72px;height:72px;image-rendering:pixelated}
  .species-card .sp-name{font-size:0.85rem;font-weight:700;margin-top:0.3rem}
  .sp-strip{height:4px;border-radius:2px;margin-bottom:0.5rem}
  .species-card.custom-entry{display:flex;flex-direction:column;align-items:center;justify-content:center}
  .species-card.custom-entry .custom-icon{font-size:2.2rem;margin-bottom:0.3rem}

  /* ── pet stage ── */
  #stage-screen{display:none;flex-direction:column;align-items:center;gap:1rem;width:100%;max-width:700px}
  .happiness-bar{width:100%;max-width:340px;display:flex;align-items:center;gap:0.6rem}
  .happiness-track{flex:1;height:14px;border-radius:999px;background:rgba(255,255,255,0.1);overflow:hidden}
  .happiness-fill{height:100%;background:linear-gradient(90deg,#f8d030,#f05030);transition:width 0.4s ease}
  .hunger-fill{background:linear-gradient(90deg,#8bc34a,#4e9a2a)}
  #pet-stage{position:relative;width:100%;height:52vh;min-height:280px;border-radius:20px;border:2px solid var(--border);background:#141024;overflow:hidden}
  #pet-sprite{position:absolute;z-index:4;width:96px;height:96px;image-rendering:pixelated;cursor:pointer;transition:left 1.8s ease-in-out, top 1.8s ease-in-out;filter:drop-shadow(0 6px 8px rgba(0,0,0,0.4))}

  /* ── 動作動畫（吃東西/睡覺/使用招式）：暫時把#pet-sprite的src蓋成透明像素，
     改用background-image播放PMDCollab的sprite sheet，播完（或loop被打斷）再換回原本的靜態圖 ── */
  .pet-anim-playing{background-repeat:no-repeat;image-rendering:pixelated;animation-name:pet-anim-strip;animation-timing-function:steps(var(--frames))}
  @keyframes pet-anim-strip{from{background-position:0 0}to{background-position:calc(-1 * var(--strip-w)) 0}}

  /* ── 寶可夢穿搭疊圖層：純emoji疊圖，不做逐寶可夢像素對位（先求有）── */
  /* 位置由JS依species-specific錨點表算好直接寫inline left/top，這裡只負責繪圖層屬性 */
  .wear-layer{position:absolute;z-index:5;pointer-events:none;display:none;background-repeat:no-repeat;background-size:contain;transform:translate(-50%,-50%);transition:left 1.8s ease-in-out, top 1.8s ease-in-out}
  .wear-layer-static{position:absolute;z-index:5;pointer-events:none;background-repeat:no-repeat;background-size:contain;transform:translate(-50%,-50%)}

  /* ── 寶可夢空間：依屬性設計成一個小房間（純CSS/SVG繪製，不外抓素材）──
     結構統一：牆面(62%) + 地板(38%，帶透視感的水平木紋/磁磚) + 一個屬性主題的角落擺設 */
  .room-wall{position:absolute;inset:0 0 38% 0;z-index:0}
  .room-floor{position:absolute;left:0;right:0;bottom:0;height:40%;z-index:0;box-shadow:0 -3px 10px rgba(0,0,0,0.35) inset}
  .room-floor::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(180deg,rgba(0,0,0,0.14) 0,rgba(0,0,0,0.14) 2px,transparent 2px,transparent 22px)}
  .room-decor{position:absolute;left:0;right:0;bottom:0;height:100%;z-index:1;pointer-events:none;background-repeat:no-repeat;background-position:bottom left;background-size:auto 44%}

  .room-grass .room-wall{background:linear-gradient(180deg,#0d1f12 0%,#1a3a20 100%)}
  .room-grass .room-floor{background:#4a3624}
  .room-fire .room-wall{background:linear-gradient(180deg,#2a0e08 0%,#4a1c10 100%)}
  .room-fire .room-floor{background:#3a3a3e}
  .room-water .room-wall{background:linear-gradient(180deg,#061a2e 0%,#0e3856 100%)}
  .room-water .room-floor{background:#1c4f66}
  .room-electric .room-wall{background:linear-gradient(180deg,#241f04 0%,#463c0a 100%)}
  .room-electric .room-floor{background:#1c1a26}
  .room-ghost .room-wall{background:linear-gradient(180deg,#150c22 0%,#241238 100%)}
  .room-ghost .room-floor{background:#241a30}
  .room-normal .room-wall{background:linear-gradient(180deg,#241f16 0%,#3c3122 100%)}
  .room-normal .room-floor{background:#4a3624}

  /* 電系房間的地板改成電路格線紋路，其餘屬性用共用的木紋/磁磚 */
  .room-electric .room-floor::before{background:
    repeating-linear-gradient(180deg,rgba(248,208,48,0.16) 0,rgba(248,208,48,0.16) 1px,transparent 1px,transparent 24px),
    repeating-linear-gradient(90deg,rgba(248,208,48,0.1) 0,rgba(248,208,48,0.1) 1px,transparent 1px,transparent 24px)}
  .room-water .room-floor::before{background:
    repeating-linear-gradient(180deg,rgba(255,255,255,0.12) 0,rgba(255,255,255,0.12) 1px,transparent 1px,transparent 20px),
    repeating-linear-gradient(90deg,rgba(255,255,255,0.1) 0,rgba(255,255,255,0.1) 1px,transparent 1px,transparent 20px)}
  .reaction-pop{position:absolute;font-size:1.3rem;font-weight:800;color:#f8d030;pointer-events:none;animation:reactionFloat 1.1s ease forwards;text-shadow:0 2px 6px rgba(0,0,0,0.6)}
  @keyframes reactionFloat{0%{transform:translateY(0);opacity:0}15%{opacity:1}100%{transform:translateY(-50px);opacity:0}}
  #pet-name-label{font-size:1rem;font-weight:700}
  #pet-reaction-text{font-size:0.82rem;color:var(--muted);min-height:1.2em}

  /* ── 徽章展示位（放在寶可夢空間右上角，像掛在房間牆上的獎盃架）── */
  #badge-slot{position:absolute;right:14px;top:14px;z-index:5;width:84px;height:84px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.15s}
  #badge-slot:hover{transform:scale(1.08)}
  #badge-slot img{width:100%;height:100%;border-radius:50%;object-fit:cover;box-shadow:0 0 18px rgba(248,208,48,0.6),0 0 0 3px rgba(248,208,48,0.75)}
  #badge-slot.empty{border:2px dashed rgba(255,255,255,0.28);background:rgba(0,0,0,0.2);color:var(--muted);font-size:1.6rem;cursor:default}
  #badge-slot.empty:hover{transform:none}

  /* ── 徽章放大檢視 ── */
  #badge-modal{display:none;position:fixed;inset:0;z-index:700;align-items:center;justify-content:center;background:rgba(4,2,12,0.82);backdrop-filter:blur(2px)}
  #badge-modal.open{display:flex}
  .badge-modal-inner{display:flex;flex-direction:column;align-items:center;gap:0.9rem;padding:1rem}
  .badge-modal-inner img{width:min(320px,70vw);height:min(320px,70vw);border-radius:50%;object-fit:cover;box-shadow:0 0 40px rgba(248,208,48,0.65),0 0 0 4px rgba(248,208,48,0.8);cursor:pointer}
  .badge-modal-name{font-size:1.1rem;font-weight:800;color:#f8d030}
  .badge-modal-close{font-size:0.82rem;color:var(--muted);cursor:pointer;text-decoration:underline}

  /* ── 煙火點擊特效（純CSS粒子，沿用專案不外抓素材的風格）── */
  .firework-particle{position:fixed;width:6px;height:6px;border-radius:50%;pointer-events:none;z-index:500;animation:fireworkBurst 0.8s ease-out forwards}
  @keyframes fireworkBurst{
    0%{transform:translate(0,0) scale(1);opacity:1}
    100%{transform:translate(var(--fx),var(--fy)) scale(0.2);opacity:0}
  }

  /* ── 互動按鈕列（餵食/道具/拜訪朋友，先建UI日後再實裝）── */
  .pet-actions{display:flex;gap:0.7rem;flex-wrap:wrap;justify-content:center}
  .pet-action-btn{display:flex;flex-direction:column;align-items:center;gap:0.25rem;padding:0.6rem 1.1rem;border-radius:14px;border:2px solid var(--border);background:rgba(255,255,255,0.05);color:var(--text);font-size:0.78rem;font-weight:700;cursor:pointer;transition:all 0.15s}
  .pet-action-btn:hover{background:rgba(255,255,255,0.1);transform:translateY(-2px)}
  .pet-action-btn .icon{font-size:1.4rem}

  /* ── 敬請期待 toast ── */
  #toast{position:fixed;left:50%;bottom:2rem;transform:translateX(-50%) translateY(20px);background:rgba(20,20,35,0.95);border:1px solid var(--border);border-radius:999px;padding:0.6rem 1.4rem;font-size:0.85rem;color:var(--text);z-index:600;opacity:0;pointer-events:none;transition:all 0.25s ease}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ── 金幣顯示 ── */
  #coin-display{display:flex;align-items:center;gap:0.35rem;font-size:0.85rem;font-weight:700;color:#f8d030}

  /* ── 房間裝飾插槽（固定擺放點，買來的道具擺這裡）── */
  .decor-slot{position:absolute;z-index:3;width:52px;height:52px;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.7rem;transition:transform 0.15s;background:rgba(0,0,0,0.15)}
  .decor-slot:hover{transform:scale(1.08)}
  .decor-slot.empty{border:2px dashed rgba(255,255,255,0.25);color:rgba(255,255,255,0.3);font-size:1.3rem}
  .slot-wall{top:14px;left:14px}
  .slot-floor-mid{bottom:14px;left:55%;transform:translateX(-50%)}
  .slot-floor-mid:hover{transform:translateX(-50%) scale(1.08)}
  .slot-floor-right{bottom:14px;right:14px}

  /* ── 商城 / 插槽選擇 彈窗（跟徽章放大彈窗同一套fixed置中樣式）── */
  .modal-overlay{display:none;position:fixed;inset:0;z-index:700;align-items:center;justify-content:center;background:rgba(4,2,12,0.82);backdrop-filter:blur(2px)}
  .modal-overlay.open{display:flex}
  .modal-box{display:flex;flex-direction:column;gap:0.9rem;padding:1.3rem;background:var(--bg);border:1px solid var(--border);border-radius:18px;width:min(360px,88vw);max-height:80vh;overflow-y:auto}
  .modal-box h2{font-size:1.05rem}
  .modal-close{align-self:center;font-size:0.82rem;color:var(--muted);cursor:pointer;text-decoration:underline}
  .shop-item{display:flex;align-items:center;gap:0.7rem;padding:0.6rem 0.7rem;border:1px solid var(--border);border-radius:12px}
  .shop-item .icon{font-size:1.6rem}
  .shop-item .info{flex:1}
  .shop-item .name{font-weight:700;font-size:0.9rem}
  .shop-item .price{font-size:0.78rem;color:#f8d030}
  .shop-item button{padding:0.4rem 0.9rem;border-radius:999px;border:none;font-size:0.8rem;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#f8d030,#f05030);color:#1a1a2e}
  .shop-item button:disabled{background:rgba(255,255,255,0.1);color:var(--muted);cursor:not-allowed}
  .slot-pick-item{display:flex;align-items:center;gap:0.7rem;padding:0.6rem 0.7rem;border:1px solid var(--border);border-radius:12px;cursor:pointer}
  .slot-pick-item:hover{background:rgba(255,255,255,0.06)}
  .slot-pick-item .icon{font-size:1.6rem}
  .shop-group-title{font-size:0.85rem;color:var(--muted);margin-top:0.5rem}
  .shop-group-title:first-child{margin-top:0}

  /* ── 拜訪朋友：唯讀小房間畫面（重用 room-wall/room-floor/room-decor 渲染邏輯）── */
  .visit-input-row{display:flex;gap:0.5rem}
  .visit-input-row input{flex:1;padding:0.5rem 0.7rem;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,0.05);color:var(--text);font-size:0.85rem}
  .visit-go-btn{padding:0.5rem 1rem;border-radius:999px;border:none;font-size:0.82rem;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#f8d030,#f05030);color:#1a1a2e}
  .mini-stage{position:relative;width:100%;height:300px;border-radius:14px;border:2px solid var(--border);background:#141024;overflow:hidden;margin:0.4rem 0}
  /* 拜訪朋友：兩隻寶可夢一起顯示在同一個房間——left/top由JS各自獨立控制走位，transform只負責置中在該座標上 */
  .visit-pet-sprite{position:absolute;transform:translate(-50%,-50%);width:72px;height:72px;image-rendering:pixelated;z-index:4;filter:drop-shadow(0 6px 8px rgba(0,0,0,0.4));transition:left 1.8s ease-in-out, top 1.8s ease-in-out}
  .visit-pet-label{position:absolute;transform:translate(-50%,0);font-size:0.68rem;color:var(--muted);white-space:nowrap;z-index:4;text-shadow:0 1px 3px rgba(0,0,0,0.8);transition:left 1.8s ease-in-out, top 1.8s ease-in-out}
  .visit-badge{position:absolute;right:10px;top:10px;width:44px;height:44px;border-radius:50%;object-fit:cover;box-shadow:0 0 12px rgba(248,208,48,0.6),0 0 0 2px rgba(248,208,48,0.75);z-index:5}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="wrap">
  <h1>我的寶可夢</h1>

  <div id="gate-screen">
    <p style="color:var(--muted)">這個玩法需要先登入帳號才能使用。</p>
    <a class="btn btn-primary" href="/pvp.html">前往登入</a>
    <a class="back" href="/">← 返回主選單</a>
  </div>

  <div id="pick-screen">
    <p id="pick-subtitle" style="color:var(--muted)">選一隻寶可夢陪伴你（選定後無法更換）</p>
    <div class="pick-grid" id="pick-grid"></div>
    <a class="back" href="/" id="pick-back-link">← 返回主選單</a>
  </div>

  <div id="stage-screen">
    <div id="pet-name-label"></div>
    <div class="happiness-bar">
      <span style="font-size:0.85rem;color:var(--muted)">好感度</span>
      <div class="happiness-track"><div class="happiness-fill" id="happiness-fill"></div></div>
      <span id="happiness-text" style="font-size:0.85rem;font-weight:700">0/100</span>
      <div id="coin-display">🪙 <span id="coin-text">0</span></div>
    </div>
    <div class="happiness-bar">
      <span style="font-size:0.85rem;color:var(--muted)">飢餓值</span>
      <div class="happiness-track"><div class="happiness-fill hunger-fill" id="hunger-fill"></div></div>
      <span id="hunger-text" style="font-size:0.85rem;font-weight:700">0/100</span>
    </div>
    <div id="pet-stage"></div>
    <div id="pet-reaction-text"></div>
    <div class="pet-actions">
      <div class="pet-action-btn" onclick="feedPet()"><span class="icon">🍖</span>餵食</div>
      <div class="pet-action-btn" onclick="openShopModal()"><span class="icon">🎒</span>道具</div>
      <div class="pet-action-btn" onclick="openVisitModal()"><span class="icon">🚪</span>拜訪朋友</div>
    </div>
    <p style="font-size:0.68rem;color:var(--muted);text-align:center">動作素材來源：<a href="https://github.com/PMDCollab/SpriteCollab" target="_blank" rel="noopener" style="color:var(--muted)">PMDCollab/SpriteCollab</a>（CC BY-NC）</p>
    <a class="back" href="/">← 返回主選單</a>
  </div>
</div>
<div id="toast"></div>
<div id="badge-modal" onclick="closeBadgeModal()">
  <div class="badge-modal-inner" onclick="event.stopPropagation()">
    <img id="badge-modal-img" src="" alt="" onclick="triggerFirework(event.clientX, event.clientY)">
    <div class="badge-modal-name" id="badge-modal-name"></div>
    <div class="badge-modal-close" onclick="closeBadgeModal()">關閉</div>
  </div>
</div>
<div id="shop-modal" class="modal-overlay" onclick="closeShopModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h2>🎒 商城</h2>
    <div id="shop-list"></div>
    <div class="modal-close" onclick="closeShopModal()">關閉</div>
  </div>
</div>
<div id="slot-modal" class="modal-overlay" onclick="closeSlotModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h2>選擇擺放的道具</h2>
    <div id="slot-pick-list"></div>
    <div class="modal-close" onclick="closeSlotModal()">關閉</div>
  </div>
</div>
<div id="visit-modal" class="modal-overlay" onclick="closeVisitModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h2>🚪 拜訪朋友</h2>
    <div id="visit-search" class="visit-input-row">
      <input id="visit-username-input" type="text" placeholder="輸入玩家帳號">
      <button class="visit-go-btn" onclick="visitFriend()">查看</button>
    </div>
    <div id="visit-result" style="display:none"></div>
    <div class="modal-close" onclick="closeVisitModal()">關閉</div>
  </div>
</div>

<script>
/* ─────────────────────────────────────────
   STAR CANVAS
───────────────────────────────────────── */
(function(){
  const cvs=document.getElementById('stars'),ctx=cvs.getContext('2d');let stars=[];
  function resize(){cvs.width=innerWidth;cvs.height=innerHeight;stars=Array.from({length:120},()=>({x:Math.random()*cvs.width,y:Math.random()*cvs.height,r:Math.random()*1.3+0.2,a:Math.random(),da:(Math.random()-0.5)*0.007}));}
  function draw(){ctx.clearRect(0,0,cvs.width,cvs.height);for(const s of stars){s.a+=s.da;if(s.a<=0.05||s.a>=1)s.da=-s.da;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${s.a.toFixed(2)})`;ctx.fill();}requestAnimationFrame(draw);}
  resize();draw();addEventListener('resize',resize);
})();

/* ─────────────────────────────────────────
   DATA — 跟 server.js 的 PET_SPECIES 保持一致：御三家初形態＋皮卡丘為主要選項，
   另外「客製化寶可夢」(custom:true) 提供幾隻御三家以外的選擇
───────────────────────────────────────── */
const PET_SPECIES = [
  { id: 1,   name: '妙蛙種子', type: 'grass' },
  { id: 4,   name: '小火龍',   type: 'fire' },
  { id: 7,   name: '傑尼龜',   type: 'water' },
  { id: 152, name: '菊草葉',   type: 'grass' },
  { id: 155, name: '火球鼠',   type: 'fire' },
  { id: 158, name: '小鋸鱷',   type: 'water' },
  { id: 25,  name: '皮卡丘',   type: 'electric' },
  { id: 722, name: '木木梟',   type: 'grass',    newGen: true, slug: 'rowlet' },
  { id: 906, name: '新葉喵',   type: 'grass',    newGen: true, slug: 'sprigatito' },
  { id: 909, name: '呆火鱷',   type: 'fire',     newGen: true, slug: 'fuecoco' },
  { id: 92,  name: '鬼斯',     type: 'ghost',  custom: true },
  { id: 132, name: '百變怪',   type: 'normal', custom: true },
  { id: 133, name: '伊布',     type: 'normal', custom: true },
];
const TYPE_COLOR = { grass:'#78c850', fire:'#f05030', water:'#6890f0', electric:'#f8d030', ghost:'#705898', normal:'#a8a878' };

/* 動作動畫素材：PMDCollab/SpriteCollab（CC BY-NC，已在畫面上標註來源）。

// PokeAPI 的 Gen5 黑白動圖是最正宗的原始像素點陣風格，但只收錄到第五世代——
// 木木梟/新葉喵/呆火鱷這些較新的寶可夢沒有這組圖，只有這 3 隻才需要 fallback 到
// Pokemon Showdown 的動態圖（Showdown 對新世代寶可夢有粉絲重製、風格相近的動圖）。
// 舊的 10 隻一律維持原本的 PokeAPI 圖源，不要因為想統一而改動已經正確的部分。
function spriteUrls(sp) {
  if (sp.newGen) {
    return {
      animated: `https://play.pokemonshowdown.com/sprites/ani/${sp.slug}.gif`,
      static:   `https://play.pokemonshowdown.com/sprites/gen5/${sp.slug}.png`,
    };
  }
  return {
    animated: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/${sp.id}.gif`,
    static:   `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${sp.id}.png`,
  };
}

let myToken = localStorage.getItem('pvpToken') || null;
let pet = null; // { speciesId, happiness, coins, hunger } | null
let badge = null; // { id, name, image } | null —— 目前只能由GM後台手動指定，還沒有自動判定機制
let decorations = []; // [{ itemId, slot }] —— slot為null代表在道具欄裡還沒擺放
let shopItems = null; // 從 /api/shop 抓一次快取起來，跟BADGES一樣是純資料registry
const DECOR_SLOTS = ['slot-wall', 'slot-floor-mid', 'slot-floor-right'];
const WEARABLE_SLOTS = ['wear-face'];

function showScreen(id) {
  ['gate-screen','pick-screen','stage-screen'].forEach(s => {
    document.getElementById(s).style.display = (s === id) ? 'flex' : 'none';
  });
}

async function init() {
  if (!myToken) { showScreen('gate-screen'); return; }
  try {
    const meRes = await fetch('/api/me', { headers: { Authorization: `Bearer ${myToken}` } });
    if (!meRes.ok) { showScreen('gate-screen'); return; }
    const petRes = await fetch('/api/pet', { headers: { Authorization: `Bearer ${myToken}` } });
    if (!petRes.ok) { showScreen('gate-screen'); return; }
    const data = await petRes.json();
    pet = data.pet;
    badge = data.badge || null;
    decorations = data.decorations || [];
    await ensureShopItems(); // 先抓好道具資料，房間插槽才能正確顯示已擺放道具的圖示
    if (pet) { startStage(); claimDailyCoins(); } else showPicker();
  } catch (e) {
    showScreen('gate-screen');
  }
}

function renderSpeciesCard(sp) {
  const col = TYPE_COLOR[sp.type] || '#888';
  const urls = spriteUrls(sp);
  const el = document.createElement('div');
  el.className = 'species-card';
  el.innerHTML = `
    <div class="sp-strip" style="background:${col}"></div>
    <img src="${urls.animated}" alt="${sp.name}" onerror="this.onerror=null;this.src='${urls.static}'">
    <div class="sp-name">${sp.name}</div>
  `;
  el.onclick = () => choosePet(sp.id);
  return el;
}

function showPicker() {
  const grid = document.getElementById('pick-grid');
  grid.innerHTML = '';
  document.getElementById('pick-subtitle').textContent = '選一隻寶可夢陪伴你（選定後無法更換）';
  document.getElementById('pick-back-link').textContent = '← 返回主選單';
  document.getElementById('pick-back-link').onclick = null;
  document.getElementById('pick-back-link').href = '/';
  PET_SPECIES.filter(sp => !sp.custom).forEach(sp => grid.appendChild(renderSpeciesCard(sp)));

  // 客製化寶可夢：點了之後顯示御三家以外的選項
  const customEl = document.createElement('div');
  customEl.className = 'species-card custom-entry';
  customEl.innerHTML = `<div class="custom-icon">✨</div><div class="sp-name">客製化寶可夢</div>`;
  customEl.onclick = showCustomPicker;
  grid.appendChild(customEl);

  showScreen('pick-screen');
}

function showCustomPicker() {
  const grid = document.getElementById('pick-grid');
  grid.innerHTML = '';
  document.getElementById('pick-subtitle').textContent = '客製化寶可夢（御三家以外的選擇）';
  const backLink = document.getElementById('pick-back-link');
  backLink.textContent = '← 返回選擇畫面';
  backLink.href = 'javascript:void(0)';
  backLink.onclick = (e) => { e.preventDefault(); showPicker(); };
  PET_SPECIES.filter(sp => sp.custom).forEach(sp => grid.appendChild(renderSpeciesCard(sp)));
  showScreen('pick-screen');
}

async function choosePet(speciesId) {
  try {
    const res = await fetch('/api/pet/choose', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${myToken}` },
      body: JSON.stringify({ speciesId }),
    });
    if (!res.ok) return; // 409/400等——保守起見不特別處理，重新整理會拿到目前真實狀態
    const data = await res.json();
    pet = data.pet;
    startStage();
  } catch (e) { /* 網路失敗，留在選擇畫面讓玩家再試一次 */ }
}

/* ─────────────────────────────────────────
   PET STAGE — 待機閒晃動畫 + 點擊互動
───────────────────────────────────────── */
let walkTimer = null;
let currentSpUrls = null;
function startStage() {
  showScreen('stage-screen');
  const species = PET_SPECIES.find(s => s.id === pet.speciesId);
  document.getElementById('pet-name-label').textContent = species ? species.name : '寶可夢';
  updateHappinessUI(pet.happiness);
  updateCoinsUI(pet.coins || 0);
  updateHungerUI(pet.hunger != null ? pet.hunger : 100);

  const stage = document.getElementById('pet-stage');
  stage.innerHTML = '';
  stage.className = species ? `room-${species.type}` : '';
  renderRoomDecor(stage, species ? species.type : null);

  const badgeSlot = document.createElement('div');
  badgeSlot.id = 'badge-slot';
  stage.appendChild(badgeSlot);
  renderBadgeSlot();

  renderDecorSlots(stage);

  const spUrls = spriteUrls(species || { id: pet.speciesId });
  currentSpUrls = spUrls;
  const img = document.createElement('img');
  img.id = 'pet-sprite';
  img.src = spUrls.animated;
  img.onerror = () => { img.onerror = null; img.src = spUrls.static; };
  img.onclick = interactPet;
  stage.appendChild(img);

  // 初始位置置中
  const stageW = stage.clientWidth, stageH = stage.clientHeight;
  img.style.left = (stageW / 2 - 48) + 'px';
  img.style.top  = (stageH / 2 - 48) + 'px';

  renderWearLayers(stage);

  if (walkTimer) clearInterval(walkTimer);
  scheduleWalk();
  resetIdleTimer();
}

/* facingLeft跟currentAnimScale都要寫進同一個img.style.transform，兩邊(走位鏡像/動作動畫縮放)
   都呼叫applySpriteTransform()合併寫入，不要各自直接寫transform，否則會互相蓋掉對方 */
let facingLeft = false;
function applySpriteTransform() {
  const img = document.getElementById('pet-sprite');
  if (!img) return;
  img.style.transform = `scaleX(${facingLeft ? -1 : 1}) scale(${currentAnimScale})`;
}

function scheduleWalk() {
  const delay = 2000 + Math.random() * 2000;
  walkTimer = setTimeout(() => {
    walkToRandomSpot();
    scheduleWalk();
  }, delay);
}

function walkToRandomSpot() {
  const stage = document.getElementById('pet-stage');
  const img = document.getElementById('pet-sprite');
  if (!stage || !img) return;
  const stageW = stage.clientWidth, stageH = stage.clientHeight;
  const margin = 96;
  const newX = Math.random() * Math.max(1, stageW - margin);
  const newY = Math.random() * Math.max(1, stageH - margin);
  const curX = parseFloat(img.style.left) || 0;
  if (newX < curX) facingLeft = true;
  else if (newX > curX) facingLeft = false;
  img.style.left = newX + 'px';
  img.style.top  = newY + 'px';
  applySpriteTransform();
  syncWearPositions();
}

function updateHappinessUI(happiness) {
  document.getElementById('happiness-fill').style.width = happiness + '%';
  document.getElementById('happiness-text').textContent = `${happiness}/100`;
}

function updateHungerUI(hunger) {
  pet.hunger = hunger;
  document.getElementById('hunger-fill').style.width = hunger + '%';
  document.getElementById('hunger-text').textContent = `${hunger}/100`;
}

function updateCoinsUI(coins) {
  pet.coins = coins;
  document.getElementById('coin-text').textContent = coins;
}

/* ─────────────────────────────────────────
   每日金幣——沒有背景排程，進畫面時主動呼叫一次，伺服器用日期欄位lazy判斷今天有沒有領過
───────────────────────────────────────── */
async function claimDailyCoins() {
  try {
    const res = await fetch('/api/pet/claim-daily-coins', {
      method: 'POST',
      headers: { Authorization: `Bearer ${myToken}` },
    });
    if (!res.ok) return;
    const data = await res.json();
    updateCoinsUI(data.coins);
    if (data.granted) showToast(`🪙 今日獲得 ${data.gained} 枚金幣！`);
  } catch (e) { /* 網路暫時失敗，明天再試一次即可，不影響其他功能 */ }
}

function renderDecorSlots(stage) {
  DECOR_SLOTS.forEach(slot => {
    const el = document.createElement('div');
    el.id = slot;
    el.className = 'decor-slot ' + slot;
    el.onclick = () => openSlotModal(slot);
    stage.appendChild(el);
  });
  updateDecorSlotsUI();
}

function updateDecorSlotsUI() {
  DECOR_SLOTS.forEach(slot => {
    const el = document.getElementById(slot);
    if (!el) return;
    const placed = decorations.find(d => d.slot === slot);
    if (placed && shopItems && shopItems[placed.itemId]) {
      el.className = 'decor-slot ' + slot;
      el.textContent = shopItems[placed.itemId].icon;
      el.title = shopItems[placed.itemId].name;
    } else {
      el.className = 'decor-slot empty ' + slot;
      el.textContent = '＋';
      el.title = '點擊擺放道具';
    }
  });
}

/* ─────────────────────────────────────────
   寶可夢穿搭疊圖層——固定3個身體部位，pointer-events:none（不是可點擊的插槽，
   透過商城彈窗裡的「穿上/收下」按鈕切換，見 toggleWear()）
───────────────────────────────────────── */
function renderWearLayers(stage) {
  WEARABLE_SLOTS.forEach(slot => {
    const el = document.createElement('div');
    el.id = slot;
    el.className = 'wear-layer';
    stage.appendChild(el);
  });
  updateWearLayersUI();
  syncWearPositions();
}

function updateWearLayersUI() {
  WEARABLE_SLOTS.forEach(slot => {
    const el = document.getElementById(slot);
    if (!el) return;
    const placed = decorations.find(d => d.slot === slot);
    const wear = placed && WEARABLE_SVG[placed.itemId];
    if (placed && wear) {
      el.style.backgroundImage = `url("data:image/svg+xml,${encodeURIComponent(wear.svg)}")`;
      el.style.width = wear.w + 'px';
      el.style.height = wear.h + 'px';
      el.title = shopItems[placed.itemId] ? shopItems[placed.itemId].name : '';
      el.style.display = 'block';
    } else {
      el.style.backgroundImage = '';
      el.style.display = 'none';
    }
  });
}

function syncWearPositions() {
  const img = document.getElementById('pet-sprite');
  if (!img || !pet) return;
  const x = parseFloat(img.style.left) || 0;
  const y = parseFloat(img.style.top) || 0;
  const anchors = WEAR_ANCHORS[pet.speciesId];
  if (!anchors) return;
  WEARABLE_SLOTS.forEach(slot => {
    const el = document.getElementById(slot);
    if (!el) return;
    const [ax, ay] = anchors[slot];
    // 錨點座標是「面向右」的原始sprite量出來的；寶可夢走位面向左時img會scaleX(-1)鏡像，
    // 眼睛位置也要跟著左右鏡像（繞96px box的水平中線鏡像），不然眼鏡會停在鏡像前的舊位置
    const mirroredAx = facingLeft ? (96 - ax) : ax;
    el.style.left = (x + mirroredAx) + 'px';
    el.style.top = (y + ay) + 'px';
  });
}

/* ─────────────────────────────────────────
   商城——道具買了永久持有（不是消耗品），可以自由更換擺放位置
───────────────────────────────────────── */
async function ensureShopItems() {
  if (shopItems) return;
  try {
    const res = await fetch('/api/shop');
    const data = await res.json();
    shopItems = data.items || {};
  } catch (e) { shopItems = {}; }
}

async function openShopModal() {
  await ensureShopItems();
  renderShopList();
  document.getElementById('shop-modal').classList.add('open');
}

function closeShopModal() {
  document.getElementById('shop-modal').classList.remove('open');
}

function renderShopList() {
  const list = document.getElementById('shop-list');
  const renderGroup = (entries) => entries.map(([itemId, item]) => {
    const owned = decorations.some(d => d.itemId === itemId);
    const affordable = (pet.coins || 0) >= item.price;
    let btnLabel, btnAction, disabled;
    if (!owned) {
      btnLabel = '購買';
      btnAction = `buyItem('${itemId}')`;
      disabled = !affordable;
    } else if (item.category === 'wearable') {
      const equipped = decorations.some(d => d.itemId === itemId && d.slot === item.slot);
      btnLabel = equipped ? '收下' : '穿上';
      btnAction = `toggleWear('${itemId}')`;
      disabled = false;
    } else {
      btnLabel = '已擁有';
      btnAction = '';
      disabled = true;
    }
    return `
      <div class="shop-item">
        <span class="icon">${item.icon}</span>
        <div class="info">
          <div class="name">${item.name}</div>
          <div class="price">🪙 ${item.price}</div>
        </div>
        <button ${disabled ? 'disabled' : ''} onclick="${btnAction}">${btnLabel}</button>
      </div>
    `;
  }).join('');
  const entries = Object.entries(shopItems);
  const decorEntries = entries.filter(([, item]) => item.category !== 'wearable');
  const wearEntries = entries.filter(([, item]) => item.category === 'wearable');
  list.innerHTML =
    `<div class="shop-group-title">房間裝飾</div>` + renderGroup(decorEntries) +
    `<div class="shop-group-title">寶可夢穿搭</div>` + renderGroup(wearEntries);
}

async function buyItem(itemId) {
  try {
    const res = await fetch('/api/pet/buy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${myToken}` },
      body: JSON.stringify({ itemId }),
    });
    if (!res.ok) return;
    const data = await res.json();
    updateCoinsUI(data.coins);
    decorations.push({ itemId, slot: null });
    renderShopList();
  } catch (e) { /* 網路失敗，維持原狀讓玩家再試一次 */ }
}

/* 穿搭類道具沒有房間插槽可點，直接在商城列表用「穿上/收下」按鈕切換裝備狀態，
   複用跟房間裝飾同一個 POST /api/pet/place 端點——wearable的slot是資料本身固定的。 */
async function toggleWear(itemId) {
  const item = shopItems[itemId];
  const entry = decorations.find(d => d.itemId === itemId);
  const newSlot = (entry && entry.slot === item.slot) ? null : item.slot;
  try {
    const res = await fetch('/api/pet/place', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${myToken}` },
      body: JSON.stringify({ itemId, slot: newSlot }),
    });
    if (!res.ok) return;
    if (entry) entry.slot = newSlot;
    updateWearLayersUI();
    syncWearPositions();
    renderShopList();
  } catch (e) { /* 網路失敗，維持原狀讓玩家再試一次 */ }
}

/* ─────────────────────────────────────────
   插槽選擇彈窗——列出已購買但還沒擺放的道具；若這個插槽已經有東西，額外提供「收回」選項
───────────────────────────────────────── */
let activeSlot = null;
async function openSlotModal(slot) {
  await ensureShopItems();
  activeSlot = slot;
  renderSlotPickList();
  document.getElementById('slot-modal').classList.add('open');
}

function closeSlotModal() {
  document.getElementById('slot-modal').classList.remove('open');
  activeSlot = null;
}

function renderSlotPickList() {
  const list = document.getElementById('slot-pick-list');
  const current = decorations.find(d => d.slot === activeSlot);
  const available = decorations.filter(d => d.slot === null && shopItems[d.itemId] && shopItems[d.itemId].category !== 'wearable');
  let html = '';
  if (current && shopItems[current.itemId]) {
    html += `<div class="slot-pick-item" onclick="placeItem('${current.itemId}', null)">
      <span class="icon">${shopItems[current.itemId].icon}</span>
      <div class="info"><div class="name">收回「${shopItems[current.itemId].name}」</div></div>
    </div>`;
  }
  if (!available.length) {
    html += `<p style="color:var(--muted);font-size:0.82rem">道具欄目前沒有可擺放的道具，先去商城買一些吧！</p>`;
  } else {
    html += available.map(d => {
      const item = shopItems[d.itemId];
      if (!item) return '';
      return `<div class="slot-pick-item" onclick="placeItem('${d.itemId}', '${activeSlot}')">
        <span class="icon">${item.icon}</span>
        <div class="info"><div class="name">${item.name}</div></div>
      </div>`;
    }).join('');
  }
  list.innerHTML = html;
}

async function placeItem(itemId, slot) {
  try {
    const res = await fetch('/api/pet/place', {
      method: 'POST',

function triggerFirework(cx, cy) {
  const colors = ['#f8d030', '#f05030', '#6890f0', '#78c850', '#e040fb', '#ffffff'];
  const count = 24;
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.3;
    const dist = 60 + Math.random() * 70;
    const p = document.createElement('div');
    p.className = 'firework-particle';
    p.style.left = cx + 'px';
    p.style.top = cy + 'px';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.setProperty('--fx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--fy', Math.sin(angle) * dist + 'px');
    document.body.appendChild(p);
    p.addEventListener('animationend', () => p.remove(), { once: true });
  }
}

  toast.textContent = message;
  toast.classList.add('show');

let interacting = false;

  interacting = true;

───────────────────────────────────────── */

/* ─────────────────────────────────────────
   動作動畫播放引擎——暫時把#pet-sprite的src蓋成透明像素，改用background-image
   播放PMDCollab的sprite sheet；不逐幀還原AnimData.xml裡每幀不同的Duration，
   改用「張數×固定時長」搭配CSS steps()均勻播完，對這麼小的圖示肉眼看不出差異。
   縮放大小用PET_ANIM_SCALE（每隻寶可夢一個校正值，見該常數上方註解跟
   .claude/skills/pet-sprite-calibration/SKILL.md），套上限ANIM_SCALE_CAP避免部分
   frame本身較大的動作被放得太誇張。transform:scale()是在background-position/steps()
   算完frame切割「之後」才套用的整體縮放，不用連帶改--strip-w等原生像素座標。

   圖片預載（重要）：sprite sheet是從PMDCollab即時抓的，網路較慢時如果直接把img.src蓋成
   透明像素、同時background-image還沒載完，中間會有一段空窗期畫面上完全看不到寶可夢
   （回報過的「餵食畫面沒出來、寶可夢不見」就是這個——舊版TRANSPARENT_PIXEL其實是不小心
   做成不透明白色，那個bug意外把這段空窗期的「消失」蓋成「變白」，兩個bug疊在一起導致
   一直沒發現真正的空窗期問題；透明像素修好之後，空窗期就真的看不到寶可夢了）。
   修法：background-image用一個獨立的Image()物件預先載入，確定onload後才真的把src換成
   透明像素、開始播放動畫；載入失敗就直接放棄這次動畫、維持原本待機圖不受影響。 */
let animTimer = null;
let sleeping = false;
let currentAnimScale = 1;
function playPetAnim(speciesId, animName, loop) {
  const table = PET_ANIM[speciesId];
  if (!table) return;
  const useName = table[animName] ? animName : 'Idle';
  const meta = table[useName];
  if (!meta || !currentSpUrls) return;
  const img = document.getElementById('pet-sprite');
  if (!img) return;
  const [w, h, n] = meta;
  const dex = String(speciesId).padStart(4, '0');
  const url = `${PET_ANIM_BASE_URL}/${dex}/${useName}-Anim.png`;

  const preload = new Image();
  preload.onload = () => reveal();
  preload.onerror = () => { /* 載入失敗，放棄這次動畫，維持原本待機圖 */ };
  preload.src = url;

  function reveal() {
    if (animTimer) { clearTimeout(animTimer); animTimer = null; }
    sleeping = (animName === 'Sleep' && !!loop);
    if (sleeping) {
      // 睡覺時停在房間正中央、暫停走位計時器，直到下次互動（resetIdleTimer裡的stopPetAnim）才恢復閒晃
      if (walkTimer) { clearTimeout(walkTimer); walkTimer = null; }
      const stage = document.getElementById('pet-stage');
      if (stage) {
        img.style.left = (stage.clientWidth / 2 - w / 2) + 'px';
        img.style.top = (stage.clientHeight / 2 - h / 2) + 'px';
        facingLeft = false;
      }
    }
    // 動畫播放期間穿搭疊圖暫時隱藏——WEAR_ANCHORS是對照待機動圖校正的，換成PMDCollab
    // 完全不同來源/姿勢的動作sprite後那組座標不適用，硬套只會讓眼鏡飄在錯的地方
    WEARABLE_SLOTS.forEach(slot => {
      const el = document.getElementById(slot);
      if (el) el.style.display = 'none';
    });
    const rawScale = PET_ANIM_SCALE[speciesId] || 2;
    currentAnimScale = Math.min(rawScale, ANIM_SCALE_CAP / Math.max(w, h));
    img.classList.add('pet-anim-playing');
    img.style.backgroundImage = `url("${url}")`;
    img.style.width = w + 'px';
    img.style.height = h + 'px';
    img.style.setProperty('--frames', n);
    img.style.setProperty('--strip-w', (w * n) + 'px');
    img.src = TRANSPARENT_PIXEL;
    applySpriteTransform();
    const duration = n * 120;
    img.style.animationDuration = duration + 'ms';
    img.style.animationIterationCount = loop ? 'infinite' : '1';
    if (!loop) animTimer = setTimeout(stopPetAnim, duration);
  }
}

function stopPetAnim() {
  if (animTimer) { clearTimeout(animTimer); animTimer = null; }
  const wasSleeping = sleeping;
  sleeping = false;
  currentAnimScale = 1;
  const img = document.getElementById('pet-sprite');
  if (img) {
    img.classList.remove('pet-anim-playing');
    img.style.backgroundImage = '';
    img.style.width = '';
    img.style.height = '';
    if (currentSpUrls) img.src = currentSpUrls.animated;
    applySpriteTransform();
  }
  if (wasSleeping && !walkTimer) scheduleWalk();
  updateWearLayersUI();
  syncWearPositions();
}

/* 閒置一段時間沒有互動（點擊寵物/按按鈕）就播放Sleep迴圈，純裝飾不影響任何數值；
   下次互動立刻中斷恢復。客戶端限定，不存檔、不動server。 */
let idleTimer = null;
const IDLE_SLEEP_MS = 60000;
function resetIdleTimer() {
  if (idleTimer) clearTimeout(idleTimer);
  if (sleeping) stopPetAnim();
  idleTimer = setTimeout(() => {
    if (pet) playPetAnim(pet.speciesId, 'Sleep', true);
  }, IDLE_SLEEP_MS);
}

/* ─────────────────────────────────────────
   拜訪朋友——唯讀查詢，重用renderRoomDecor房間渲染邏輯，不用另外複製一套畫面。
   兩隻寶可夢（自己的+朋友的）一起顯示在朋友的房間裡、各自獨立閒晃，純視覺上的「在一起」，
   不是真的即時連線同步（雙方各自瀏覽器獨立算自己的走位，沒有WebSocket）。
───────────────────────────────────────── */
let visitWalkTimers = [];
function clearVisitWalkTimers() {
  visitWalkTimers.forEach(t => clearTimeout(t));
  visitWalkTimers = [];
}

function openVisitModal() {
  resetIdleTimer();
  clearVisitWalkTimers();
  document.getElementById('visit-username-input').value = '';
  document.getElementById('visit-result').style.display = 'none';
  document.getElementById('visit-result').innerHTML = '';
  document.getElementById('visit-search').style.display = 'flex';
  document.getElementById('visit-modal').classList.add('open');
}

function closeVisitModal() {
  clearVisitWalkTimers();
  document.getElementById('visit-modal').classList.remove('open');
}

async function visitFriend() {
  const username = document.getElementById('visit-username-input').value.trim();
  if (!username) return;
  const resultEl = document.getElementById('visit-result');
  resultEl.style.display = 'block';
  resultEl.innerHTML = `<p style="color:var(--muted);font-size:0.82rem">查詢中…</p>`;
  try {
    const res = await fetch(`/api/pet/visit/${encodeURIComponent(username)}`, {
      headers: { Authorization: `Bearer ${myToken}` },
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      resultEl.innerHTML = `<p style="color:var(--muted);font-size:0.82rem">${err.error === 'no_pet' ? '這位玩家還沒有寶可夢。' : '查無此玩家。'}</p>`;
      return;
    }
    const data = await res.json();
    renderVisitResult(data);
  } catch (e) {
    resultEl.innerHTML = `<p style="color:var(--muted);font-size:0.82rem">查詢失敗，請稍後再試。</p>`;
  }
}

const VISIT_GREETINGS = ['熱情地打了招呼！', '好奇地互相打量著對方！', '一起玩了起來！', '開心地繞著彼此轉圈！'];

function renderVisitResult(data) {
  document.getElementById('visit-search').style.display = 'none';
  const resultEl = document.getElementById('visit-result');
  resultEl.style.display = 'block';
  resultEl.innerHTML = '';
  clearVisitWalkTimers();

  const header = document.createElement('div');
  header.style.cssText = 'display:flex;justify-content:space-between;align-items:center';
  header.innerHTML = `<span style="font-weight:700">${data.username} 的空間</span><span style="font-size:0.82rem;color:var(--muted)">好感度 ${data.pet.happiness}/100</span>`;
  resultEl.appendChild(header);

  const friendSpecies = PET_SPECIES.find(s => s.id === data.pet.speciesId);
  const stage = document.createElement('div');
  stage.className = 'mini-stage' + (friendSpecies ? ` room-${friendSpecies.type}` : '');
  resultEl.appendChild(stage);
  renderRoomDecor(stage, friendSpecies ? friendSpecies.type : null);
  renderReadOnlyDecor(stage, data.decorations || []);

  if (data.badge) {
    const b = document.createElement('img');
    b.src = data.badge.image;
    b.alt = data.badge.name;
    b.title = data.badge.name;
    b.className = 'visit-badge';
    stage.appendChild(b);
  }

  // 兩隻寶可夢一起顯示在朋友的房間裡：朋友的寶可夢（唯讀，穿著朋友幫牠買的穿搭）+ 自己的寶可夢
  // （帶自己的穿搭一起「過去」），各自獨立閒晃，純視覺上的「在一起」的感覺
  const friendSprite = setupVisitSprite(stage, data.pet.speciesId, data.decorations, `${data.username} 的${friendSpecies ? friendSpecies.name : '寶可夢'}`, 'visit-friend');
  friendSprite.placeAt(0.28, 0.55);
  if (pet) {
    const mySpecies = PET_SPECIES.find(s => s.id === pet.speciesId);
    const mySprite = setupVisitSprite(stage, pet.speciesId, decorations, `你的${mySpecies ? mySpecies.name : '寶可夢'}`, 'visit-mine');
    mySprite.placeAt(0.72, 0.55);
  }

  const greetEl = document.createElement('p');
  greetEl.style.cssText = 'font-size:0.8rem;color:var(--muted);text-align:center;min-height:1.2em';
  greetEl.textContent = pet ? `兩隻寶可夢${VISIT_GREETINGS[Math.floor(Math.random() * VISIT_GREETINGS.length)]}` : '';
  resultEl.appendChild(greetEl);

  const backBtn = document.createElement('div');
  backBtn.className = 'modal-close';
  backBtn.style.marginTop = '0.6rem';
  backBtn.textContent = '← 重新查詢';
  backBtn.onclick = openVisitModal;
  resultEl.appendChild(backBtn);
}

/* 唯讀房間插槽（房間裝飾），穿搭改由setupVisitSprite掛在寶可夢本體上處理，這裡只剩房間3插槽 */
function renderReadOnlyDecor(stage, decs) {
  decs.forEach(d => {
    if (!shopItems || !shopItems[d.itemId] || !DECOR_SLOTS.includes(d.slot)) return;
    const item = shopItems[d.itemId];
    const el = document.createElement('div');
    el.className = 'decor-slot ' + d.slot;
    el.textContent = item.icon;
    el.title = item.name;
    stage.appendChild(el);
  });
}

/* 拜訪畫面專用的寶可夢渲染——刻意跟主畫面的#pet-sprite/renderWearLayers分開一套獨立實作
   （id用idPrefix區分，不會跟主畫面或另一隻拜訪用寶可夢衝突），因為這裡一次要放兩隻、
   沒有點擊互動、也不需要跟server同步，直接複用會需要把主畫面那套改成參數化，風險更高。 */
function setupVisitSprite(stage, speciesId, decs, label, idPrefix) {
  const species = PET_SPECIES.find(s => s.id === speciesId);
  const spUrls = spriteUrls(species || { id: speciesId });
  const scale = 72 / 96; // 拜訪畫面sprite縮小成72×72顯示，WEAR_ANCHORS是96×96原生座標，等比例換算

  const img = document.createElement('img');
  img.className = 'visit-pet-sprite';
  img.id = idPrefix + '-sprite';
  img.src = spUrls.static;
  img.onerror = () => { img.onerror = null; img.src = spUrls.animated; };
  stage.appendChild(img);

  const labelEl = document.createElement('div');
  labelEl.className = 'visit-pet-label';
  labelEl.textContent = label;
  stage.appendChild(labelEl);

  const wearEls = {};
  WEARABLE_SLOTS.forEach(slot => {
    const el = document.createElement('div');
    el.className = 'wear-layer-static';
    stage.appendChild(el);
    wearEls[slot] = el;
  });
  (decs || []).forEach(d => {
    if (!wearEls[d.slot] || !shopItems || !shopItems[d.itemId]) return;
    const wear = WEARABLE_SVG[d.itemId];
    if (!wear) return;
    wearEls[d.slot].style.backgroundImage = `url("data:image/svg+xml,${encodeURIComponent(wear.svg)}")`;
    wearEls[d.slot].style.width = (wear.w * scale) + 'px';
    wearEls[d.slot].style.height = (wear.h * scale) + 'px';
    wearEls[d.slot].style.display = 'block';
  });

  let mirrored = false;
  function syncWear() {
    const anchors = WEAR_ANCHORS[speciesId];
    if (!anchors) return;
    const x = parseFloat(img.style.left) || 0;
    const y = parseFloat(img.style.top) || 0;
    WEARABLE_SLOTS.forEach(slot => {
      const [ax, ay] = anchors[slot];
      // 跟主畫面syncWearPositions()同一個道理：sprite鏡像時眼睛位置要跟著左右鏡像
      const mirroredAx = mirrored ? (96 - ax) : ax;
      wearEls[slot].style.left = (x + mirroredAx * scale) + 'px';
      wearEls[slot].style.top = (y + ay * scale) + 'px';
    });
  }

  function placeAt(fracX, fracY) {
    const x = stage.clientWidth * fracX, y = stage.clientHeight * fracY;
    img.style.left = x + 'px'; img.style.top = y + 'px';
    labelEl.style.left = x + 'px'; labelEl.style.top = (y + 30) + 'px';
    syncWear();
    scheduleWalk();
  }

  function walk() {
    const stageW = stage.clientWidth, stageH = stage.clientHeight;
    const margin = 40;
    const newX = margin + Math.random() * Math.max(1, stageW - margin * 2);
    const newY = stageH * 0.35 + Math.random() * (stageH * 0.5);
    const curX = parseFloat(img.style.left) || 0;
    mirrored = newX < curX;
    img.style.transform = `translate(-50%,-50%) scaleX(${mirrored ? -1 : 1})`;
    img.style.left = newX + 'px'; img.style.top = newY + 'px';
    labelEl.style.left = newX + 'px'; labelEl.style.top = (newY + 30) + 'px';
    syncWear();
    scheduleWalk();
  }

  function scheduleWalk() {
    const t = setTimeout(walk, 2200 + Math.random() * 2000);
    visitWalkTimers.push(t);
  }

  return { placeAt };
}

init();
</script>
