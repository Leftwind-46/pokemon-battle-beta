<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BMI 健康計算機</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #07091a;
      --surface:  rgba(255,255,255,0.05);
      --border:   rgba(255,255,255,0.10);
      --text:     #e8eaf6;
      --muted:    #7986cb;
      --accent:   #7986cb;

      --c-under:  #60a5fa;
      --c-normal: #4ade80;
      --c-over:   #fb923c;
      --c-obese:  #f87171;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    #stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Header ── */
    header {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 80px 20px 40px;
    }

    .eyebrow {
      font-size: 0.82rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 800;
      background: linear-gradient(135deg, #60a5fa 0%, #4ade80 50%, #fb923c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.15;
    }

    .subtitle {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.7;
    }

    /* ── Main Card ── */
    main {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      padding: 0 20px 80px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 36px 32px;
      backdrop-filter: blur(16px);
      transition: border-color 0.4s ease, box-shadow 0.4s ease;
      position: relative;
      overflow: hidden;
    }

    .card-glow {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 24px 24px 0 0;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      transition: background 0.4s ease;
    }

    /* ── Inputs ── */
    .inputs {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-top: 8px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 0.82rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    input[type="number"] {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 52px 14px 18px;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    input[type="number"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(121,134,203,0.2);
    }

    .unit {
      position: absolute;
      right: 16px;
      font-size: 0.85rem;
      color: var(--muted);
      pointer-events: none;
    }

    /* ── Result ── */
    .result {
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.5s ease, transform 0.5s ease;
      pointer-events: none;
    }

    .result.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .bmi-number {
      font-size: clamp(3rem, 12vw, 4.5rem);
      font-weight: 800;
      line-height: 1;
      transition: color 0.4s ease;
      color: var(--accent);
    }

    .status-badge {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 6px 20px;
      border-radius: 99px;
      border: 1px solid;
      transition: background 0.4s ease, color 0.4s ease, border-color 0.4s ease;
    }

    .status-desc {
      font-size: 0.88rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
      max-width: 300px;
    }

    /* ── BMI Scale Bar ── */
    .scale-wrap {
      margin-top: 28px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.5s ease 0.1s, transform 0.5s ease 0.1s;
    }

    .scale-wrap.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .scale-labels {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .scale-labels span {
      font-size: 0.7rem;
      color: var(--muted);
    }

    .scale-bar {
      position: relative;
      height: 10px;
      border-radius: 99px;
      background: linear-gradient(90deg,
        var(--c-under) 0%,
        var(--c-under) 28%,
        var(--c-normal) 28%,
        var(--c-normal) 56%,
        var(--c-over) 56%,
        var(--c-over) 75%,
        var(--c-obese) 75%,
        var(--c-obese) 100%
      );
      overflow: visible;
    }

    .scale-pointer {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: white;
      border: 3px solid var(--accent);
      box-shadow: 0 0 12px var(--accent);
      transition: left 0.5s cubic-bezier(0.34,1.56,0.64,1), border-color 0.4s ease, box-shadow 0.4s ease;
    }

    .scale-category-labels {
      display: flex;
      margin-top: 8px;
    }

    .scale-cat {
      flex: 1;
      text-align: center;
      font-size: 0.68rem;
      font-weight: 600;
    }

    .scale-cat:nth-child(1) { color: var(--c-under); flex: 28; }
    .scale-cat:nth-child(2) { color: var(--c-normal); flex: 28; }
    .scale-cat:nth-child(3) { color: var(--c-over); flex: 19; }
    .scale-cat:nth-child(4) { color: var(--c-obese); flex: 25; }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 28px 0;
    }

    /* ── Footer ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 24px 20px 40px;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.8;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card { animation: fadeUp 0.6s ease both 0.15s; }
  </style>
</head>
<body>

<canvas id="stars"></canvas>

<header>
  <p class="eyebrow">Health Calculator</p>
  <h1>BMI 健康計算機</h1>
  <p class="subtitle">輸入您的身高與體重，<br>即時了解您的身體質量指數與健康狀態。</p>
</header>

<main>
  <div class="card">
    <div class="card-glow" id="glow"></div>

    <div class="inputs">
      <div class="field">
        <label for="height">身高</label>
        <div class="input-wrap">
          <input type="number" id="height" placeholder="170" min="1" max="300" inputmode="decimal" />
          <span class="unit">cm</span>
        </div>
      </div>
      <div class="field">
        <label for="weight">體重</label>
        <div class="input-wrap">
          <input type="number" id="weight" placeholder="60" min="1" max="500" inputmode="decimal" />
          <span class="unit">kg</span>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="result" id="result">
      <div class="bmi-number" id="bmiNumber">--</div>
      <span class="status-badge" id="statusBadge"></span>
      <p class="status-desc" id="statusDesc"></p>
    </div>

    <div class="scale-wrap" id="scaleWrap">
      <div class="scale-labels">
        <span>10</span>
        <span>18.5</span>
        <span>25</span>
        <span>30</span>
        <span>40</span>
      </div>
      <div class="scale-bar">
        <div class="scale-pointer" id="pointer"></div>
      </div>
      <div class="scale-category-labels">
        <span class="scale-cat">過輕</span>
        <span class="scale-cat">正常</span>
        <span class="scale-cat">過重</span>
        <span class="scale-cat">肥胖</span>
      </div>
    </div>
  </div>
</main>

<footer>
  <p>BMI = 體重(kg) ÷ 身高(m)²</p>
  <p style="margin-top:4px; opacity:0.5;">依據 WHO 國際標準分類</p>
</footer>

<script>
  /* ── Starfield ── */
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function initStars(n = 160) {
    stars = Array.from({ length: n }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.3 + 0.2,
      a: Math.random(),
      speed: Math.random() * 0.4 + 0.1,
      twinkle: Math.random() * Math.PI * 2,
    }));
  }

  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.twinkle += s.speed * 0.02;
      const alpha = s.a * (0.5 + 0.5 * Math.sin(s.twinkle));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,210,255,${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }

  resize();
  initStars();
  requestAnimationFrame(drawStars);
  window.addEventListener('resize', () => { resize(); initStars(); });

  /* ── BMI Calculator ── */
  const STATUS = [
    {
      max: 18.5,
      label: '過輕',
      color: '#60a5fa',
      bg: 'rgba(96,165,250,0.15)',
      desc: '體重偏輕，建議適度增加營養均衡的飲食，並配合適當運動以增加肌肉量。',
    },
    {
      max: 25,
      label: '正常',
      color: '#4ade80',
      bg: 'rgba(74,222,128,0.15)',
      desc: '體重維持在健康範圍內，繼續保持均衡飲食與規律運動的好習慣！',
    },
    {
      max: 30,
      label: '過重',
      color: '#fb923c',
      bg: 'rgba(251,146,60,0.15)',
      desc: '體重稍微偏高，建議調整飲食結構、減少高熱量食物攝取，並增加有氧運動。',
    },
    {
      max: Infinity,
      label: '肥胖',
      color: '#f87171',
      bg: 'rgba(248,113,113,0.15)',
      desc: '體重超出健康範圍，建議諮詢醫師或營養師，制定個人化的減重計畫。',
    },
  ];

  const heightEl  = document.getElementById('height');
  const weightEl  = document.getElementById('weight');
  const resultEl  = document.getElementById('result');
  const scaleWrap = document.getElementById('scaleWrap');
  const bmiNumEl  = document.getElementById('bmiNumber');
  const badgeEl   = document.getElementById('statusBadge');
  const descEl    = document.getElementById('statusDesc');
  const pointerEl = document.getElementById('pointer');
  const glowEl    = document.getElementById('glow');
  const cardEl    = document.querySelector('.card');
  const heightInput = document.getElementById('height');

  let animRaf = null;
  let currentBmi = 0;

  function getStatus(bmi) {
    return STATUS.find(s => bmi < s.max);
  }

  /* Map bmi to % position on the scale bar (range 10–40) */
  function bmiToPercent(bmi) {
    const clamped = Math.max(10, Math.min(40, bmi));
    return ((clamped - 10) / 30) * 100;
  }

  function applyColor(color, bg) {
    bmiNumEl.style.color  = color;
    badgeEl.style.color   = color;
    badgeEl.style.borderColor = color;
    badgeEl.style.background  = bg;
    pointerEl.style.borderColor = color;
    pointerEl.style.boxShadow   = `0 0 12px ${color}`;
    glowEl.style.background = `linear-gradient(90deg, transparent, ${color}, transparent)`;
    cardEl.style.borderColor = `rgba(${hexToRgb(color)}, 0.35)`;
    cardEl.style.boxShadow   = `0 20px 60px -15px rgba(${hexToRgb(color)}, 0.25)`;

    /* focus ring on inputs */
    document.documentElement.style.setProperty('--accent', color);
  }

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `${r},${g},${b}`;
  }

  function animateBmi(target) {
    if (animRaf) cancelAnimationFrame(animRaf);
    const start = performance.now();
    const duration = 600;
    const from = currentBmi;

    function step(now) {
      const t = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - t, 3);
      const val = from + (target - from) * ease;
      bmiNumEl.textContent = val.toFixed(1);
      if (t < 1) animRaf = requestAnimationFrame(step);
      else currentBmi = target;
    }
    requestAnimationFrame(step);
  }

  function calculate() {
    const h = parseFloat(heightEl.value);
    const w = parseFloat(weightEl.value);

    if (!h || !w || h <= 0 || h > 300 || w <= 0 || w > 500) {
      resultEl.classList.remove('visible');
      scaleWrap.classList.remove('visible');
      currentBmi = 0;
      /* reset card style */
      cardEl.style.borderColor = '';
      cardEl.style.boxShadow   = '';
      glowEl.style.background  = '';
      document.documentElement.style.setProperty('--accent', '#7986cb');
      return;
    }

    const bmi    = w / Math.pow(h / 100, 2);
    const status = getStatus(bmi);

    animateBmi(bmi);
    badgeEl.textContent = status.label;
    descEl.textContent  = status.desc;
    applyColor(status.color, status.bg);
    pointerEl.style.left = bmiToPercent(bmi) + '%';

    resultEl.classList.add('visible');
    scaleWrap.classList.add('visible');
  }

  heightEl.addEventListener('input', calculate);
  weightEl.addEventListener('input', calculate);
</script>
</body>
</html>
